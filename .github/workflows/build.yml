name: Build image

on:
  workflow_dispatch:
    inputs:
      mastodon_version:
        description: Upstream Mastodon version, without the leading v
        required: true
      platforms:
        description: Target platforms
        required: false
        default: linux/amd64

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          MASTODON_VERSION_INPUT: ${{ github.event.inputs.mastodon_version }}
          PLATFORMS_INPUT: ${{ github.event.inputs.platforms }}
        run: |
          version="$MASTODON_VERSION_INPUT"
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "mastodon_version is required" >&2
            exit 1
          fi
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME secret is required" >&2
            exit 1
          fi
          platforms="$PLATFORMS_INPUT"
          if [ -z "$platforms" ]; then
            platforms="linux/amd64"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.version.outputs.platforms }}
          push: true
          build-args: |
            MASTODON_VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/mastodon/mastodon
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mastodon:${{ steps.version.outputs.version }}
